<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>织梦纪 DreamWeave</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">DW</div>
          <div>
            <h1>织梦纪</h1>
            <p id="connectionStatus">连接中</p>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="discoverButton" type="button" title="作品大厅">
            <span aria-hidden="true">⌂</span>
          </button>
          <button class="icon-button" id="playButton" type="button" title="当前游玩">
            <span aria-hidden="true">▶</span>
          </button>
          <button class="icon-button" id="creatorButton" type="button" title="作者后台">
            <span aria-hidden="true">✎</span>
          </button>
          <button class="icon-button" id="libraryToggle" type="button" title="故事与会话">
            <span aria-hidden="true">☰</span>
          </button>
          <button class="icon-button" id="settingsToggle" type="button" title="设定">
            <span aria-hidden="true">⚙</span>
          </button>
        </div>
      </header>

      <section class="library-panel" id="libraryPanel" hidden>
        <div class="library-column">
          <div class="panel-heading">
            <span>故事</span>
            <button id="newStoryButton" type="button">新建</button>
          </div>
          <div class="library-list" id="storyList"></div>
        </div>
        <div class="library-column">
          <div class="panel-heading">
            <span>会话</span>
            <button id="newSessionButton" type="button">新建</button>
          </div>
          <div class="library-list" id="sessionList"></div>
        </div>
      </section>

      <section class="settings-panel" id="settingsPanel" hidden>
        <label>
          <span>模型</span>
          <select id="modelSelect">
            <option value="qwen3:14b">qwen3:14b</option>
          </select>
        </label>
        <label>
          <span>标题</span>
          <input id="storyTitle" value="黑夜古堡" />
        </label>
        <label>
          <span>世界观</span>
          <textarea id="worldSetting" rows="3">中世纪奇幻世界</textarea>
        </label>
        <label>
          <span>角色</span>
          <textarea id="characterSetting" rows="3">用户是失忆的贵族继承人</textarea>
        </label>
        <div class="settings-actions">
          <button class="secondary-button" id="saveStorySettingsButton" type="button">保存设定</button>
          <span id="settingsSaveStatus" aria-live="polite"></span>
        </div>
      </section>

      <section class="discover-view app-view" id="discoverView" hidden>
        <div class="view-heading">
          <div>
            <span>作品大厅</span>
            <h2>选择一个世界开始游玩</h2>
          </div>
          <button class="secondary-button" id="refreshWorksButton" type="button">刷新</button>
        </div>
        <div class="work-grid" id="workGrid"></div>
      </section>

      <section class="work-detail-view app-view" id="workDetailView" hidden>
        <button class="text-button" id="backToDiscoverButton" type="button">返回大厅</button>
        <article class="work-detail" id="workDetail"></article>
      </section>

      <section class="creator-view app-view" id="creatorView" hidden>
        <div class="view-heading">
          <div>
            <span>作者后台</span>
            <h2>作品管理</h2>
          </div>
          <button class="secondary-button" id="newCreatorWorkButton" type="button">新建草稿</button>
        </div>
        <div class="creator-layout">
          <div class="creator-list" id="creatorWorkList"></div>
          <form class="creator-editor" id="creatorWorkForm" hidden>
            <div class="form-row">
              <label>
                <span>标题</span>
                <input id="creatorTitle" />
              </label>
              <label>
                <span>状态</span>
                <select id="creatorStatus">
                  <option value="draft">草稿</option>
                  <option value="published">已发布</option>
                  <option value="archived">已归档</option>
                </select>
              </label>
            </div>
            <label>
              <span>简介</span>
              <textarea id="creatorDescription" rows="3"></textarea>
            </label>
            <label>
              <span>标签</span>
              <input id="creatorTags" placeholder="悬疑, 古风, 低魔" />
            </label>
            <label>
              <span>封面地址</span>
              <input id="creatorCoverImage" placeholder="https://..." />
            </label>
            <div class="form-row">
              <label>
                <span>默认模型</span>
                <input id="creatorDefaultModel" />
              </label>
              <label>
                <span>作品 ID</span>
                <input id="creatorWorkId" disabled />
              </label>
            </div>
            <label>
              <span>世界观</span>
              <textarea id="creatorWorldSetting" rows="4"></textarea>
            </label>
            <label>
              <span>角色</span>
              <textarea id="creatorCharacterSetting" rows="4"></textarea>
            </label>
            <label>
              <span>开场白</span>
              <textarea id="creatorOpeningMessage" rows="4"></textarea>
            </label>
            <div class="creator-actions">
              <button class="primary-button" id="saveCreatorWorkButton" type="submit">保存</button>
              <button class="secondary-button" id="publishCreatorWorkButton" type="button">发布</button>
              <button class="secondary-button" id="unpublishCreatorWorkButton" type="button">下架</button>
              <button class="secondary-button danger-button" id="deleteCreatorWorkButton" type="button">删除</button>
              <span id="creatorSaveStatus" aria-live="polite"></span>
            </div>
          </form>
        </div>
      </section>

      <section class="story-stage app-view" id="playView" aria-live="polite">
        <div class="story-meta">
          <span id="storyTitleDisplay">黑夜古堡</span>
          <span id="workerStatus">Worker 未连接</span>
        </div>
        <section class="state-strip" id="storyStatePanel" hidden>
          <div class="state-grid">
            <div>
              <span>场景</span>
              <strong id="stateScene">未知</strong>
            </div>
            <div>
              <span>阶段</span>
              <strong id="stateStage">opening</strong>
            </div>
          </div>
          <div class="state-events" id="stateEvents" hidden></div>
          <p id="stateSummary"></p>
        </section>
        <div class="message-list" id="messageList"></div>
      </section>

      <form class="composer" id="composer">
        <textarea
          id="messageInput"
          rows="2"
          placeholder="写下你的下一步行动"
          autocomplete="off"
        ></textarea>
        <button class="send-button" id="sendButton" type="submit">
          <span aria-hidden="true">↗</span>
          <span>发送</span>
        </button>
      </form>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
